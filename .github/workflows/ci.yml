name: ci

on:
  push:
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint baseline (high-signal rules)
        run: ruff check src config scripts tests --select E9,F63,F7,F82

      - name: Run tests
        run: pytest -q

      - name: Smoke check
        run: python scripts/smoke_check.py
